# FireSchedule Configuration

# User preferences
user:
  name: ""
  timezone: "America/New_York"

# Schedule categories
categories:
  school:
    enabled: true
    color: "blue"
  learning:
    enabled: true
    color: "green"
    languages:
      - Python
      - Bash
  exercise:
    enabled: true
    color: "red"
    default_days:
      - Saturday: "Gym"
      - Sunday: "Run"
  social:
    enabled: true
    color: "yellow"

# Reminders
reminders:
  enabled: true
  default_minutes_before: 15
  daily_summary_enabled: false
  daily_summary_time: "08:00"
  notification_sound: true

# Data storage
storage:
  base_path: "data"
  format: "markdown"
  backup_path: "backups"

# TUI settings
tui:
  theme: "default"
  show_completed: false
  week_starts_on: "monday"

# Notion integration
notion:
  enabled: false
  api_token: ""
  database_id: ""
  auto_sync: false

# Google Calendar integration
gcal:
  enabled: false
  credentials_file: "credentials.json"
  token_file: "token.json"
  calendar_id: "primary"
  auto_sync: false
  sync_interval_minutes: 30
